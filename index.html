ABOUT
Northern Lights Resort & Spa (NLRS) is a luxury all-inclusive aurora resort approximately 25km south of Whitehorse, Yukon, Canada — about a 20-minute drive from city center. Owned and run by Tobias and Lynn. Open August to April only, closed in summer.

let history = [];
let apiKey = '';

function renderMd(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  const lines = html.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    if (/^- /.test(line)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + line.slice(2) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      if (line.trim()) out.push('<p>' + line + '</p>');
    }
  }
  if (inList) out.push('</ul>');
  return out.join('');
}

function setKey() {} // not needed on Vercel

function addUserMsg(text) {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function addBotMsg(text) {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = renderMd(text);
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  return d;
}

function showTyping() {
  const el = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'typing'; d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function typeText(msgEl, fullText) {
  let displayed = '';
  for (let i = 0; i < fullText.length; i++) {
    displayed += fullText[i];
    msgEl.innerHTML = renderMd(displayed);
    document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    await new Promise(r => setTimeout(r, STREAM_DELAY_MS));
  }
}

async function send(text) {
  if (!text || !apiKey) return;
  addUserMsg(text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        stream: true,
        system: SYSTEM,
        messages: history,
        tools: [{
          type: 'web_search_20250305',
          name: 'web_search',
          allowed_domains: ['northernlightsyukon.com']
        }],
        tool_choice: { type: 'auto' }
      })
    });

    if (!res.ok) {
      removeTyping();
      const raw = await res.text();
      const d = document.createElement('div');
      d.className = 'msg err';
      d.textContent = 'API error ' + res.status + ': ' + raw.slice(0, 200);
      document.getElementById('msgs').appendChild(d);
      history.pop();
    } else {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                fullText += parsed.delta.text;
              }
            } catch(e) {}
          }
        }
      }
      removeTyping();
      const msgEl = document.createElement('div');
      msgEl.className = 'msg bot';
      document.getElementById('msgs').appendChild(msgEl);
      await typeText(msgEl, fullText);
      history.push({ role: 'assistant', content: fullText });
      if (history.length > 20) history = history.slice(-20);
      // Detect if AI offered the family referral so we can handle the yes/no response
      if (/family-friendly recommendations|pass your details|southern lakes/i.test(fullText)) {
        familyPending = true;
      }
    }
  } catch (e) {
    removeTyping();
    const d = document.createElement('div');
    d.className = 'msg err';
    d.textContent = 'Error: ' + e.message;
    document.getElementById('msgs').appendChild(d);
    history.pop();
  }
}

// Airtable chat logger — credentials handled server-side via /api/log
const AT_TOKEN = '';
const AT_BASE  = '';
const AT_TABLE = '';
let callbackRequested = false;
let familyReferralTriggered = false;
let sessionLogged = false; // prevent duplicate logs

function logToAirtable(callback) {
  if (sessionLogged) { if (callback) callback(false, 'Already logged.'); return; }
  if (history.length === 0) { if (callback) callback(false, 'No conversation to log.'); return; }
  sessionLogged = true;
  clearTimeout(inactivityTimer); // stop any pending timer
  const firstQuestion = history.find(m => m.role === 'user')?.content?.slice(0, 100) || '';
  const messageCount = history.length;
  const transcript = getTranscript();
  const timestamp = new Date().toLocaleString('en-CA', { timeZone: 'America/Whitehorse', hour12: true });
  fetch('/api/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ timestamp, firstQuestion, messageCount, callbackRequested, familyReferral: familyReferralTriggered, transcript })
  })
  .then(r => r.json())
  .then(d => { if (callback) callback(d.success ? true : false, d.error); })
  .catch(e => { if (callback) callback(false, e.message); });
}

function manualLog() {
  const btn = document.getElementById('log-btn');
  if (sessionLogged) { btn.textContent = '✓ Already logged'; return; }
  btn.textContent = 'Logging…';
  btn.style.color = '#888';
  logToAirtable((success, err) => {
    if (success) {
      btn.textContent = '✓ Logged';
      btn.style.color = '#26B99A';
      btn.style.textDecoration = 'none';
      btn.style.cursor = 'default';
    } else {
      btn.textContent = 'Failed — check console';
      btn.style.color = '#c0392b';
      console.error('Airtable log error:', err);
      sessionLogged = false; // allow retry on failure
    }
  });
}

// Also try on tab close (best effort)
window.addEventListener('beforeunload', () => logToAirtable());

// Log after 3 minutes of inactivity — once only
let inactivityTimer = null;
function resetInactivityTimer() {
  if (sessionLogged) return; // don't reset if already logged
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => logToAirtable(), 3 * 60 * 1000);
}

function getTranscript() {
  if (history.length === 0) return '(No prior conversation)';
  return history.map(m => (m.role === 'user' ? 'Guest: ' : 'Assistant: ') + m.content).join('\n\n');
}

async function sendCallbackEmail(name, phone) {
  // Rate limit: max 3 attempts per hour stored in localStorage
  const key = 'nlrs_cb_attempts';
  const now = Date.now();
  let attempts = JSON.parse(localStorage.getItem(key) || '[]');
  attempts = attempts.filter(t => now - t < 60 * 60 * 1000);
  if (attempts.length >= 3) throw new Error('Rate limit exceeded');
  attempts.push(now);
  localStorage.setItem(key, JSON.stringify(attempts));

  const sentAt = new Date().toLocaleString('en-CA', { timeZone: 'America/Whitehorse', hour12: true });

  const r1 = await fetch('/api/email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'callback', guest_name: name, guest_phone: phone, sent_at: sentAt, transcript: getTranscript() })
  });
  if (!r1.ok) throw new Error('Email send failed');
}

async function sendFamilyReferralEmail(name, email) {
  const sentAt = new Date().toLocaleString('en-CA', { timeZone: 'America/Whitehorse', hour12: true });
  const r2 = await fetch('/api/email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'family', guest_name: name, guest_email: email, sent_at: sentAt, transcript: getTranscript() })
  });
  if (!r2.ok) throw new Error('Email send failed');
}

async function handleInput(text) {
  resetInactivityTimer();

  // Family referral flow — awaiting name
  if (callbackState === 'awaiting_family_name') {
    familyName = text;
    callbackState = 'awaiting_family_email';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    document.getElementById('msgs').appendChild(msgEl);
    const reply = 'Thank you, ' + familyName + '! And what is your email address so our team can reach out to you?';
    await typeText(msgEl, reply);
    history.push({ role: 'assistant', content: reply });
    return;
  }

  // Family referral flow — awaiting email address
  if (callbackState === 'awaiting_family_email') {
    callbackState = null;
    familyPending = false;
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      await sendFamilyReferralEmail(familyName, text);
      removeTyping();
      const msgEl = document.createElement('div');
      msgEl.className = 'msg bot';
      document.getElementById('msgs').appendChild(msgEl);
      await typeText(msgEl, 'Done — we\'ve passed your details to our team, ' + familyName + '. They\'ll be in touch with some family-friendly recommendations for the Yukon. We hope you find the perfect trip!');
    } catch(e) {
      removeTyping();
      const msgEl = document.createElement('div');
      msgEl.className = 'msg bot';
      document.getElementById('msgs').appendChild(msgEl);
      await typeText(msgEl, 'Something went wrong — please email us directly at info@northernlightsyukon.com and we\'ll be happy to help.');
    }
    return;
  }

  // Family referral — guest said yes to referral offer
  if (familyPending && /yes|sure|please|ok|yeah|yep|absolutely|gerne|ja/i.test(text)) {
    familyPending = false;
    familyReferralTriggered = true;
    callbackState = 'awaiting_family_name';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    document.getElementById('msgs').appendChild(msgEl);
    const reply = 'Wonderful! May I have your name please?';
    await typeText(msgEl, reply);
    history.push({ role: 'assistant', content: reply });
    return;
  }

  // Family referral — guest declined
  if (familyPending && /no|nope|nein|never mind|nevermind/i.test(text)) {
    familyPending = false;
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    document.getElementById('msgs').appendChild(msgEl);
    const reply = 'Of course — no problem at all. I hope you find a wonderful trip for the whole family. Is there anything else I can help you with?';
    await typeText(msgEl, reply);
    history.push({ role: 'assistant', content: reply });
    return;
  }
  if (callbackState === 'awaiting_name') {
    callbackName = text;
    callbackState = 'awaiting_phone';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    document.getElementById('msgs').appendChild(msgEl);
    const reply = 'Thank you, ' + callbackName + '! And what is the best phone number to reach you?';
    await typeText(msgEl, reply);
    history.push({ role: 'assistant', content: reply });
    return;
  }

  if (callbackState === 'awaiting_phone') {
    const phone = text;
    callbackState = null;
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      await sendCallbackEmail(callbackName, phone);
      removeTyping();
      const msgEl = document.createElement('div');
      msgEl.className = 'msg bot';
      document.getElementById('msgs').appendChild(msgEl);
      await typeText(msgEl, 'Perfect — we\'ve sent your callback request to our team. Someone will be in touch with you at ' + phone + ' shortly. In the meantime, feel free to ask me anything else!');
    } catch(e) {
      removeTyping();
      const msgEl = document.createElement('div');
      msgEl.className = 'msg bot';
      document.getElementById('msgs').appendChild(msgEl);
      const msg = e.message === 'Rate limit exceeded'
        ? 'It looks like several callback requests have already been submitted from this device. Please contact us directly at info@northernlightsyukon.com or call +1 867 393 3780.'
        : 'I\'m sorry, something went wrong sending your request. Please contact us directly at info@northernlightsyukon.com or call +1 867 393 3780.';
      await typeText(msgEl, msg);
    }
    return;
  }

  // Check if user is asking for a callback
  const cbTriggers = ['callback', 'call me', 'call back', 'ring me', 'phone me', 'speak to someone', 'talk to someone', 'human', 'person', 'staff', 'team', 'rückruf', 'zurückrufen'];
  if (cbTriggers.some(t => text.toLowerCase().includes(t))) {
    callbackState = 'awaiting_name';
    callbackRequested = true;
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    document.getElementById('msgs').appendChild(msgEl);
    const reply = 'Of course! I\'d be happy to arrange a callback for you. May I have your name please?';
    await typeText(msgEl, reply);
    history.push({ role: 'assistant', content: reply });
    return;
  }

  // Normal AI flow
  resetInactivityTimer();
  send(text);
}

});

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('send').click();
  }
});
document.getElementById('inp').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

window.addEventListener('DOMContentLoaded', () => {
  addBotMsg("Welcome to Northern Lights Resort & Spa! I'm happy to answer your questions about our packages, chalets, aurora viewing, and everything about your stay. How can I help you?");
});
